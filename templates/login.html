<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA CHAMPIONS PRO - ACCESO ELITE</title>
    <style>
        body { 
            background-image: linear-gradient(rgba(5, 10, 26, 0.85), rgba(2, 4, 15, 0.95)), url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        .login-card { 
            background: rgba(5, 11, 32, 0.65); 
            border: 1px solid rgba(56, 189, 248, 0.25); 
            border-radius: 24px; 
            padding: 40px 30px; 
            max-width: 400px; 
            width: 100%; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-align: center;
        }
        .champions-logo {
            width: 90px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.5));
        }
        .title-login { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; margin: 0 0 5px 0; color: #ffffff; font-family: 'Arial Black', sans-serif; }
        .subtitle-login { font-size: 0.75rem; color: #38bdf8; margin: 0 0 35px 0; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
        .form-group { margin-bottom: 22px; text-align: left; }
        .label-form { display: block; font-size: 0.7rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
        .input-form { width: 100%; background: rgba(1, 3, 15, 0.85); color: #fff; border: 1px solid #1e293b; padding: 14px 16px; border-radius: 12px; font-size: 0.95rem; outline: none; box-sizing: border-box; transition: 0.2s; font-family: sans-serif; }
        .input-form:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        .btn-submit { background: linear-gradient(90deg, #0284c7, #0369a1); border: 1px solid #38bdf8; color: #ffffff; font-size: 0.95rem; font-weight: 700; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; margin-top: 5px; font-family: 'Arial Black', sans-serif; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3); }
        .btn-submit:hover { background: #ffffff; color: #020617; border-color: #ffffff; transform: translateY(-1px); box-shadow: 0 12px 25px rgba(255, 255, 255, 0.2); }
        .flash-box { background: rgba(225, 29, 72, 0.15); color: #fda4af; border: 1px solid rgba(225, 29, 72, 0.3); padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 25px; font-weight: 500; font-family: sans-serif; }
        .toggle-text { font-size: 0.8rem; color: #94a3b8; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 25px; cursor: pointer; transition: 0.2s; font-family: sans-serif; }
        .toggle-text:hover { color: #38bdf8; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://imgur.com" class="champions-logo" alt="UEFA Champions League Trophy">
        <h1 class="title-login">ARENA CHAMPIONS</h1>
        <p class="subtitle-login">GENTLEMEN, START YOUR ENGINES</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="flash-box">⚠️ {{ m }}</div>
                Prefix{% endfor %}
            {% endif %}
        {% endwith %}

        <!-- FORMULARIO DE INICIO DE SESIÓN DE UNA SOLA RUTA -->
        <div id="box-login">
            <form action="/login" method="POST">
                <div class="form-group">
                    <label class="label-form">Correo Electrónico</label>
                    <input type="email" name="email" class="input-form" placeholder="nombre@correo.com" required>
                </div>
                <div class="form-group">
                    <label class="label-form">Contraseña de Acceso</label>
                    <input type="password" name="clave" class="input-form" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Ingresar a la Arena</button>
            </form>
            <span class="toggle-text" onclick="cambiarVista('registro')">¿No tienes cuenta? Regístrate aquí</span>
        </div>

        <!-- FORMULARIO DE REGISTRO -->
        <div id="box-registro" style="display: none;">
            <form action="/registrar" method="POST">
                <div class="form-group">
                    <label class="label-form">Nombre o Apodo</label>
                    <input type="text" name="nombre" class="input-form" placeholder="Tu Apodo" required>
                </div>
                <div class="form-group">
                    <label class="label-form">Correo Electrónico</label>
                    <input type="email" name="email" class="input-form" placeholder="nombre@correo.com" required>
                </div>
                <div class="form-group">
                    <label class="label-form">Contraseña</label>
                    <input type="password" name="clave" class="input-form" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" style="background: #38bdf8; border-color: #38bdf8; color: #020617;">Crear Cuenta</button>
            </form>
            <span class="toggle-text" onclick="cambiarVista('login')">Ya tengo cuenta, iniciar sesión</span>
        </div>
    </div>

    <script>
        function cambiarVista(pantalla) {
            var boxLogin = document.getElementById("box-login");
            var boxRegistro = document.getElementById("box-registro");
            if (pantalla === 'registro') {
                boxLogin.style.display = "none";
                boxRegistro.style.display = "block";
            } else {
                boxLogin.style.display = "block";
                boxRegistro.style.display = "none";
            }
        }
    </script>
</body>
</html>
