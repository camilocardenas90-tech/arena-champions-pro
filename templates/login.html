<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA CHAMPIONS PRO - ACCESO ELITE</title>
    <style>
        body { 
            background: radial-gradient(circle at 30% 30%, #0d1b3e 0%, #030712 100%); 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        .login-card { 
            background: rgba(15, 23, 42, 0.45); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 45px 30px; 
            max-width: 400px; 
            width: 100%; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
        }
        .champions-logo-area {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px auto;
            border: 2px solid #38bdf8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .champions-logo-area span { color: #38bdf8; font-size: 1.5rem; font-weight: bold; }
        .title-login { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 8px 0; color: #ffffff; }
        .subtitle-login { font-size: 0.85rem; color: #64748b; margin: 0 0 35px 0; font-weight: 500; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .label-form { display: block; font-size: 0.75rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
        .input-form { width: 100%; background: rgba(2, 6, 23, 0.8); color: #fff; border: 1px solid #334155; padding: 14px 16px; border-radius: 12px; font-size: 0.95rem; outline: none; box-sizing: border-box; transition: 0.2s; }
        .input-form:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        .btn-submit { background: #ffffff; border: none; color: #020617; font-size: 0.95rem; font-weight: 700; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #38bdf8; color: #ffffff; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        .flash-box { background: rgba(225, 29, 72, 0.15); color: #fda4af; border: 1px solid rgba(225, 29, 72, 0.3); padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 25px; font-weight: 500; }
        .toggle-text { font-size: 0.85rem; color: #38bdf8; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 25px; cursor: pointer; transition: 0.2s; }
        .toggle-text:hover { color: #7dd3fc; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="champions-logo-area"><span>★</span></div>
        <h1 class="title-login">ARENA CHAMPIONS</h1>
        <p class="subtitle-login">PLATAFORMA DE GESTIÓN DE PRONÓSTICOS</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="flash-box">⚠️ {{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- FORMULARIO DE INICIO DE SESIÓN -->
        <div id="box-login">
            <form action="/login" method="POST">
                <div class="form-group">
                    <label class="label-form">Correo Electrónico</label>
                    <input type="email" name="email" class="input-form" placeholder="nombre@correo.com" required>
                </div>
                <div class="form-group">
                    <label class="label-form">Contraseña de Acceso</label>
                    <input type="password" name="clave" class="input-form" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Iniciar Sesión</button>
            </form>
            <span class="toggle-text" onclick="toggleForm('registro')">Crear una cuenta nueva</span>
        </div>

        <!-- FORMULARIO DE REGISTRO -->
        <div id="box-registro" style="display: none;">
            <form action="/registrar" method="POST">
                <div class="form-group">
                    <label class="label-form">Nombre o Apodo</label>
                    <input type="text" name="nombre" class="input-form" placeholder="Tu Apodo" required>
                </div>
                <div class="form-group">
                    <label class="label-form">Correo Electrónico</label>
                    <input type="email" name="email" class="input-form" placeholder="nombre@correo.com" required>
                </div>
                <div class="form-group">
                    <label class="label-form">Contraseña</label>
                    <input type="password" name="clave" class="input-form" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" style="background: #38bdf8; color: #ffffff;">Registrarse</button>
            </form>
            <span class="toggle-text" style="color: #94a3b8;" onclick="toggleForm('login')">Ya tengo cuenta, iniciar sesión</span>
        </div>
    </div>

    <script>
        function toggleForm(vista) {
            var boxLogin = document.getElementById("box-login");
            var boxRegistro = document.getElementById("box-registro");
            if (vista === 'registro') {
                boxLogin.style.display = "none";
                boxRegistro.style.display = "block";
            } else {
                boxLogin.style.display = "block";
                boxRegistro.style.display = "none";
            }
        }
    </script>
</body>
</html>
