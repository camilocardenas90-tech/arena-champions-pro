<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Champions Pro - UEFA Champions League</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Se cambia a center center y fijado absoluto */
            background: url("{{ url_for('static', filename='fondo.png') }}") no-repeat center center fixed;
            background-size: 100% 100%; /* FUERZA A LA IMAGEN A MOSTRARSE COMPLETA EN LA PANTALLA */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(4, 9, 29, 0.75) 0%, rgba(5, 11, 31, 0.95) 100%);
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(10, 21, 54, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                        0 0 50px rgba(0, 102, 255, 0.2);
            text-align: center;
        }

        .brand-header {
            margin-bottom: 30px;
        }

        .uefa-text-logo {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 7px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            font-weight: 700;
        }

        .trofeo-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.2) 0%, rgba(255,255,255,0) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .trofeo-orejona {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5)) brightness(1.1);
        }

        .brand-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* TEXTO ELIMINADO DESDE AQUÍ */

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .input-control {
            width: 100%;
            background: rgba(4, 9, 24, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 16px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-control:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            background: rgba(4, 9, 24, 0.95);
        }

        .btn-champions {
            width: 100%;
            background: linear-gradient(135deg, #1d4ed8 0%, #0284c7 100%);
            border: none;
            border-radius: 10px;
            padding: 16px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .btn-champions:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.4);
        }

        .switch-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .switch-link:hover {
            color: #38bdf8;
        }

        .alert-flash {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
            color: #fca5a5;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-flash">🛡️ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="login-card">
            <div class="brand-header">
                <div class="uefa-text-logo">CHAMPIONS LEAGUE</div>
                
                <div class="trofeo-box">
                    <img src="{{ url_for('static', filename='orejona.png') }}" alt="La Orejona" class="trofeo-orejona">
                </div>
                <h1>Arena Pro</h1>
            </div>

            <div id="box-login">
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="form-group">
                        <label>Correo Corporativo</label>
                        <input type="email" name="email" class="input-control" placeholder="usuario@empresa.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" name="clave" class="input-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-champions">Ingresar a la Arena</button>
                </form>
                <a href="#" class="switch-link" onclick="cambiarVista('registro')">¿No tienes cuenta? Regístrate aquí</a>
            </div>

            <div id="box-registro" style="display: none;">
                <form action="{{ url_for('registrar') }}" method="POST">
                    <div class="form-group">
                        <label>Nombre o Apodo</label>
                        <input type="text" name="nombre" class="input-control" placeholder="Ej: K-milo" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" name="email" class="input-control" placeholder="nombre@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña de Acceso</label>
                        <input type="password" name="clave" class="input-control" placeholder="Crea tu clave segura" required>
                    </div>
                    <button type="submit" class="btn-champions">Registrar Competidor</button>
                </form>
                <a href="#" class="switch-link" onclick="cambiarVista('login')">¿Ya estás registrado? Inicia Sesión</a>
            </div>
        </div>
    </div>

    <script>
        function cambiarVista(pantalla) {
            const loginBox = document.getElementById('box-login');
            const registroBox = document.getElementById('box-registro');
            if (pantalla === 'registro') {
                loginBox.style.display = 'none';
                registroBox.style.display = 'block';
            } else {
                loginBox.style.display = 'block';
                registroBox.style.display = 'none';
            }
        }
    </script>
</body>
</html>
