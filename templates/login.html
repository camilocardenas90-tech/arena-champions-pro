<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Champions Pro - UEFA Champions League</title>
    <!-- Google Fonts para usar fuentes estilizadas y elegantes -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url("{{ url_for('static', filename='fondo.png') }}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* Capa oscura superpuesta para dar mística y legibilidad */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(5, 10, 26, 0.85) 0%, rgba(9, 21, 54, 0.75) 100%);
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Tarjeta con efecto cristal premium (Glassmorphism) */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(0, 83, 246, 0.15);
            text-align: center;
            transition: all 0.4s ease;
        }

        /* Encabezado con Logos Oficiales */
        .brand-header {
            margin-bottom: 30px;
        }

        .logo-uefa {
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .trofeo-orejona {
            max-width: 75px;
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
            filter: drop-shadow(0 0 15px rgba(0, 102, 255, 0.4));
        }

        .brand-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: #f1f5f9;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .brand-header p {
            font-size: 0.8rem;
            color: #94a3b8;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Formulario e Inputs Modernos */
        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: #cbd5e1;
            text-transform: uppercase;
        }

        .input-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 14px 16px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
            background: rgba(15, 23, 42, 0.85);
        }

        /* Botón de Acción Estilo Noche Europea */
        .btn-champions {
            width: 100%;
            background: linear-gradient(135deg, #1e40af 0%, #0284c7 100%);
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-champions:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5), 
                        0 0 15px rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
        }

        .btn-champions:active {
            transform: translateY(0);
        }

        /* Enlaces de Intercambio */
        .switch-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #38bdf8;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .switch-link:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        /* Alertas Flash de Error de Flask */
        .alert-flash {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
            color: #fca5a5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- Mensajes de Alerta del Servidor -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-flash">
                <span>🛡️</span> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="login-card">
            
            <!-- Encabezado de Identidad -->
            <div class="brand-header">
                <img src="{{ url_for('static', filename='logo-champions.png') }}" alt="UEFA Champions League" class="logo-uefa">
                <img src="{{ url_for('static', filename='orejona.png') }}" alt="La Orejona" class="trofeo-orejona">
                <h1>Arena Pro</h1>
                <p>Torneo de Oficina</p>
            </div>

            <!-- BLOQUE 1: INICIAR SESIÓN -->
            <div id="box-login">
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="form-group">
                        <label for="login-email">Correo Corporativo</label>
                        <input type="email" id="login-email" name="email" class="input-control" placeholder="usuario@empresa.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" name="clave" class="input-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-champions">Ingresar a la Arena</button>
                </form>
                <a href="#" class="switch-link" onclick="cambiarVista('registro')">¿No tienes cuenta? Regístrate aquí</a>
            </div>

            <!-- BLOQUE 2: REGISTRO DE NUEVOS COMPETIDORES -->
            <div id="box-registro" style="display: none;">
                <form action="{{ url_for('registrar') }}" method="POST">
                    <div class="form-group">
                        <label for="reg-name">Nombre o Apodo</label>
                        <input type="text" id="reg-name" name="nombre" class="input-control" placeholder="Ej: K-milo" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" name="email" class="input-control" placeholder="nombre@correo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Contraseña de Acceso</label>
                        <input type="password" id="reg-password" name="clave" class="input-control" placeholder="Crea tu clave segura" required>
                    </div>
                    <button type="submit" class="btn-champions">Registrar Competidor</button>
                </form>
                <a href="#" class="switch-link" onclick="cambiarVista('login')">¿Ya estás registrado? Inicia Sesión</a>
            </div>

        </div>
    </div>

    <!-- Script de intercambio de pantallas -->
    <script>
        function cambiarVista(pantalla) {
            const loginBox = document.getElementById('box-login');
            const registroBox = document.getElementById('box-registro');
            
            if (pantalla === 'registro') {
                loginBox.style.display = 'none';
                registroBox.style.display = 'block';
            } else {
                loginBox.style.display = 'block';
                registroBox.style.display = 'none';
            }
        }
    </script>
</body>
</html>
